name: integration

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: integration-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  remote-sqld:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Cache NuGet
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/Directory.Packages.props', '**/NuGet.config', '**/global.json') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Driver contract (Testcontainers sqld)
        run: |
          dotnet restore Nj.EntityFrameworkCore.LibSql.slnx
          dotnet test test/Nj.EntityFrameworkCore.LibSql.DriverContractTests/Nj.EntityFrameworkCore.LibSql.DriverContractTests.csproj \
            -c Release \
            --logger "trx;LogFileName=driver-remote.trx" \
            --results-directory artifacts/test-results

      - name: Remote compliance slice
        id: remote-compliance
        continue-on-error: true
        run: |
          # Remote BuiltInDataTypes and related suites are tracked separately from the local
          # compliance gate (C-016). Shared temporal/BLOB fixes apply; remaining remote-only
          # deltas (e.g. HTTP 400 max-length) are non-blocking until waived or fixed.
          set +e
          dotnet test test/Nj.EntityFrameworkCore.LibSql.ComplianceTests/Nj.EntityFrameworkCore.LibSql.ComplianceTests.csproj \
            -c Release \
            --filter "FullyQualifiedName~Remote" \
            --logger "trx;LogFileName=compliance-remote.trx" \
            --results-directory artifacts/test-results
          exit_code=$?
          echo "remote_exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload remote compliance results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: compliance-remote
          path: artifacts/test-results/compliance-remote.trx
          if-no-files-found: warn

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: integration-failure
          path: |
            artifacts/test-results
