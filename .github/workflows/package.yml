name: package
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - name: Pack
        run: |
          chmod +x eng/*.sh
          ./eng/pack.sh
      - name: Verify
        run: ./eng/verify-package.sh
      - uses: actions/upload-artifact@v4
        with:
          name: nupkgs
          path: artifacts/packages/*
      # Publishing to nuget.org is manual / sole-maintainer approved until automation secrets exist.
