name: package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Pack
        run: |
          chmod +x eng/*.sh
          ./eng/pack.sh

      - name: Verify
        run: ./eng/verify-package.sh

      - name: Generate SBOM
        run: ./eng/generate-sbom.sh

      - name: Syft SBOM (packages drop)
        uses: anchore/sbom-action@v0
        with:
          path: artifacts/packages
          format: cyclonedx-json
          output-file: artifacts/sbom/nupkgs.cdx.json
          upload-artifact: false

      - uses: actions/upload-artifact@v7
        with:
          name: nupkgs
          path: artifacts/packages/*

      - uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: artifacts/sbom/*

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: artifacts/packages/*.nupkg
      # Publishing to nuget.org is manual / sole-maintainer approved until automation secrets exist.
