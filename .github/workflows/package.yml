name: package

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Push packed nupkgs to nuget.org (Trusted Publishing / OIDC)
        type: boolean
        default: false
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Pack
        run: |
          chmod +x eng/*.sh
          ./eng/pack.sh

      - name: Verify
        run: ./eng/verify-package.sh

      - name: Generate SBOM
        run: ./eng/generate-sbom.sh

      - name: Syft SBOM (packages drop)
        uses: anchore/sbom-action@v0
        with:
          path: artifacts/packages
          format: cyclonedx-json
          output-file: artifacts/sbom/nupkgs.cdx.json
          upload-artifact: false

      - uses: actions/upload-artifact@v7
        with:
          name: nupkgs
          path: artifacts/packages/*

      - uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: artifacts/sbom/*

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: artifacts/packages/*.nupkg

      # Trusted Publishing: https://learn.microsoft.com/nuget/nuget-org/trusted-publishing
      # Requires nuget.org policy (owner=nareshjois, repo=Nj.EntityFrameworkCore.LibSQL,
      # workflow=package.yml) and secret NUGET_USER = nuget.org profile username (not email).
      - name: NuGet login (OIDC → temp API key)
        if: >-
          github.event_name == 'push' ||
          (github.event_name == 'workflow_dispatch' && inputs.publish)
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to nuget.org
        if: >-
          github.event_name == 'push' ||
          (github.event_name == 'workflow_dispatch' && inputs.publish)
        run: |
          set -euo pipefail
          dotnet nuget push artifacts/packages/*.nupkg \
            --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
