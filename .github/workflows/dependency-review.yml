name: dependency-review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Dependency review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
