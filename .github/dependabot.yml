version: 2
updates:
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      efcore:
        patterns:
          - "Microsoft.EntityFrameworkCore*"
      test-sdk:
        patterns:
          - "xunit*"
          - "Microsoft.NET.Test.Sdk"
          - "coverlet.*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
