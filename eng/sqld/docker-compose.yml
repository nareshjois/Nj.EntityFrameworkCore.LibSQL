# Pinned self-hosted sqld for integration / remote driver contract tests.
# Image digest is the multi-arch index for tag ef758d9 (amd64 + arm64).
# Prefer Testcontainers (RemoteDriverFixture) for automated tests.
services:
  sqld:
    image: ghcr.io/tursodatabase/libsql-server:ef758d9@sha256:817fb6c6865d048a509f5c120905629fb9b5af20ad0c526cdc68a6d8793898ad
    ports:
      - "8080:8080"
      - "5001:5001"
    environment:
      SQLD_NODE: primary
    volumes:
      - sqld-data:/var/lib/sqld
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8080'"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 3s

volumes:
  sqld-data:
